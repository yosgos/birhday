<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אירועים משפחתיים - משפחת בלוי</title>
    
    <style>
        /* פונטים שמחים ומעוגלים */
        @import url('https://fonts.googleapis.com/css2?family=Varela+Round&family=Assistant:wght@400;700;800;900&display=swap');

        :root {
            --primary-color: #2d3436;
            --accent-color: #FFD93D; /* צהוב שמש */
            --birthday-color: #FF6B6B; /* ורוד חזק */
            --anniversary-color: #6BCB77; /* ירוק רענן */
            --bg-color: #FFF9F0;
            --bubble-bg: #8B0000; /* אדום כהה לבועה */
            
            /* צבעי כותרת חדשים */
            --header-gradient: linear-gradient(135deg, #ff6b6b, #ff9f43);
            --month-color: #2c3e50;
        }

        body { 
            font-family: 'Varela Round', 'Assistant', sans-serif; 
            margin: 0; 
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: var(--primary-color);
            padding: 20px 0 40px 0;
            background-color: var(--bg-color);
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 86c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm66-3c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM37 7c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm61 59c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM82 45c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM53 2c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm30 82c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM4 52c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm14 35c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm71-35c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm-9-14c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm-54 2c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm-7 13c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm58 33c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23ffd93d' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E");
            overflow-x: hidden;
        }

        /* התאריך העברי למעלה */
        #hebrew-date-top {
            font-size: 14px;
            color: #7f8c8d;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        #loading { 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
        }
        
        .loader-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .loader-bg-circle {
            position: absolute;
            width: 100px;
            height: 100px;
            background: rgba(255, 217, 61, 0.2);
            border-radius: 50%;
            animation: pulseBg 1.5s infinite ease-in-out;
        }

        @keyframes pulseBg {
            0%, 100% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .loader-icon {
            font-size: 60px;
            z-index: 2;
            display: inline-block;
            animation: bounceTilt 0.8s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .loading-text-container {
            font-weight: 700;
            color: var(--birthday-color);
            font-size: 1.2rem;
            min-width: 150px;
            text-align: center;
        }

        .events-section {
            width: 90%;
            max-width: 1000px;
            margin-bottom: 50px;
        }

        .main-header-container {
            text-align: center;
            margin-bottom: 45px;
            padding: 0 20px;
        }

        .header-line-top {
            display: block;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 2px;
            background: var(--header-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.05));
        }

        .header-line-bottom {
            display: block;
            font-size: 56px;
            color: var(--month-color);
            font-weight: 900; 
            font-family: 'Assistant', sans-serif;
            letter-spacing: -2px;
            line-height: 1.1;
            text-shadow: 2px 2px 0px rgba(255, 217, 61, 0.3);
        }

        .section-title { 
            font-size: 32px; 
            margin-bottom: 30px;
            color: var(--primary-color);
            text-align: center;
            position: relative;
            display: inline-block;
            width: 100%;
            font-weight: 800;
        }

        #today-alert {
            background: white;
            border-radius: 30px;
            padding: 25px;
            margin: 0 auto 40px auto;
            text-align: center;
            box-shadow: 0 10px 0px var(--accent-color);
            border: 3px solid var(--accent-color);
            max-width: 500px;
            transform: rotate(-1deg);
        }

        .today-label {
            font-size: 16px;
            font-weight: 800;
            color: #ff9f43;
            margin-bottom: 8px;
            display: block;
        }

        .today-content {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary-color);
        }

        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .event-card {
            background: white;
            padding: 15px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px solid transparent;
        }

        .event-card:hover {
            transform: scale(1.03) rotate(1deg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .birthday-card { cursor: pointer; }
        .anniversary-card { cursor: default; }

        .birthday-card:hover { border-color: var(--birthday-color); }
        .anniversary-card:hover { border-color: var(--anniversary-color); }

        .event-icon {
            font-size: 32px;
            margin-bottom: 10px;
            background: #f8f9fa;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .e-name { 
            font-weight: 800; 
            font-size: 18px; 
            color: var(--primary-color); 
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .e-date { 
            font-size: 14px; 
            font-weight: 700; 
            padding: 3px 10px;
            border-radius: 12px;
            background: #f1f2f6;
        }

        .birthday-card .e-date { color: var(--birthday-color); background: #fff5f5; }
        .anniversary-card .e-date { color: var(--anniversary-color); background: #f0fff4; }

        .info-bubble {
            position: absolute;
            background: var(--bubble-bg);
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            z-index: 1000;
            font-size: 16px; 
            font-weight: 700;
            display: none;
            pointer-events: none;
            text-align: center;
            max-width: 80vw;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .info-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid var(--bubble-bg);
        }

        .hidden { display: none !important; }
        
        @media (max-width: 600px) {
            .header-line-top { font-size: 20px; }
            .header-line-bottom { font-size: 42px; }
            .section-title { font-size: 26px; }
            .event-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body onclick="hideBubble()">

    <!-- Hebrew Date at the very top -->
    <div id="hebrew-date-top" class="hidden"></div>

    <!-- Happy Loader -->
    <div id="loading">
        <div class="loader-wrapper">
            <div class="loader-bg-circle"></div>
            <div class="loader-icon">🥳</div>
        </div>
        <div class="loading-text-container">
            טוען נתונים<span id="loading-dots"></span>
        </div>
    </div>

    <!-- Main Section -->
    <div id="birthday-section" class="events-section hidden">
        <div class="main-header-container">
            <span class="header-line-top">ימי הולדת ונישואין</span>
            <span id="dynamic-month-line" class="header-line-bottom">טוען...</span>
        </div>
        
        <div id="today-alert" class="hidden">
            <span class="today-label">🥳 חוגגים היום:</span>
            <div class="today-content" id="today-content"></div>
        </div>

        <div id="birthday-grid" class="event-grid"></div>
    </div>

    <!-- Anniversary Section -->
    <div id="anniversary-section" class="events-section hidden">
        <h2 class="section-title">ימי נישואין ✨</h2>
        <div id="anniversary-grid" class="event-grid"></div>
    </div>

    <div id="info-bubble" class="info-bubble"></div>

    <script>
        const API_URL = 'https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrSJlmYdtljgAGMIRRyHV06oHlFbjUoVMqmyjgmHNfqRNNqWGSCTAAeZxHeU_A4NqmGS42fc-wwsGAVgc0oUBxd8YhLRYAlLCFqU5QuwPdeNsepHDuHRUUndCPYpuDVIAQurzWhZxTL8tvfKaxtytfO2ZIEpYqLE1sTO7xPDt-2BJ5B4gci0NRh2cD9YxkpdoLhvtSrQIGiUjbQJp3Uq0pVJu4geeQDr5NfpjlsBoRVizfGwGC1ykJOituOStHHhhmdK6aD28EtdufffkPI6Wl6kJIsVww&lib=MKvnEb8OzXBIaQxFnaeDEdJl9ogoAk9d_';
        const birthdayEmojis = ['🍰', '🎂', '🎈', '🎁', '🥳', '🧁', '🎊', '✨', '🍭', '🌈'];
        let bubbleTimeout;
        let dotsInterval;

        function startLoadingDots() {
            const dotsSpan = document.getElementById('loading-dots');
            let dotsCount = 0;
            dotsInterval = setInterval(() => {
                dotsCount = (dotsCount + 1) % 4;
                dotsSpan.innerText = '.'.repeat(dotsCount);
            }, 400); 
        }

        async function fetchEvents() {
            startLoadingDots();
            try {
                const response = await fetch(API_URL, { redirect: 'follow' });
                const data = await response.json();
                const items = Array.isArray(data) ? data : (data.data || []);
                if (items.length > 0) processItems(items);
                
                clearInterval(dotsInterval);
                document.getElementById('loading').classList.add('hidden');
            } catch (error) {
                console.error('Error:', error);
                clearInterval(dotsInterval);
                document.getElementById('loading').innerHTML = '<div class="loading-text-container" style="color:red">אופס! משהו לא עבד בטעינה.</div>';
            }
        }

        function processItems(items) {
            const birthdayGrid = document.getElementById('birthday-grid');
            const anniversaryGrid = document.getElementById('anniversary-grid');
            const todayAlert = document.getElementById('today-alert');
            const todayContent = document.getElementById('today-content');
            const monthLine = document.getElementById('dynamic-month-line');
            const dateTop = document.getElementById('hebrew-date-top');

            let hasBirthdays = false;
            let hasAnniversaries = false;

            // שורה 1: היום (חוגגים)
            const firstRow = items[0];
            const firstRowKeys = Object.keys(firstRow);
            const todayCol1 = (firstRow[firstRowKeys[0]] || "").toString().trim();
            const todayCol2 = (firstRow[firstRowKeys[1]] || "").toString().trim();

            // שורה 2: כותרת החודש
            if (items[1]) {
                const secondRow = items[1];
                const secondRowKeys = Object.keys(secondRow);
                let fullTitle = (secondRow[secondRowKeys[0]] || "").toString().trim();
                let cleanedTitle = fullTitle.replace("ימי הולדת ונישואין", "").replace("-", "").trim();
                monthLine.innerText = cleanedTitle || "חודש נוכחי";
            }

            // שורה 3: תאריך עברי (יוצג בראש העמוד)
            if (items[2]) {
                const thirdRow = items[2];
                const thirdRowKeys = Object.keys(thirdRow);
                let hebDateText = (thirdRow[thirdRowKeys[0]] || "").toString().trim();
                if (hebDateText) {
                    dateTop.innerText = hebDateText;
                    dateTop.classList.remove('hidden');
                }
            }

            // בניית תוכן לחוגגים היום
            let finalTodayText = "";
            const isValid = (txt) => txt && txt !== "" && txt !== "שם" && txt !== "שם חתן וכלה" && txt !== "תאריך עברי";

            if (isValid(todayCol1) && isValid(todayCol2)) {
                finalTodayText = `<span>${todayCol1}</span> <span style="color:#FF6B6B">♥</span> <span>${todayCol2}</span>`;
            } else if (isValid(todayCol1)) {
                finalTodayText = todayCol1;
            } else if (isValid(todayCol2)) {
                finalTodayText = todayCol2;
            }

            if (finalTodayText) {
                todayContent.innerHTML = finalTodayText;
                todayAlert.classList.remove('hidden');
            }

            // עיבוד שאר הפריטים (משורה 4 ואילך)
            const dataToProcess = items.slice(3);
            dataToProcess.forEach((item, index) => {
                const keys = Object.keys(item);
                const name = (item[keys[0]] || "").toString().trim();
                const type = (item[keys[1]] || "").toString().trim();
                const date = (item[keys[2]] || "").toString().trim();
                const desc = (item[keys[3]] || "").toString().trim();

                if (!name || name === "שם" || name === "שם חתן וכלה" || name === todayCol1 || name === todayCol2) return;

                const isAnniversary = type.includes('נישואין');
                if (isAnniversary) {
                    anniversaryGrid.innerHTML += createCard(name, date, 'anniversary', "", index);
                    hasAnniversaries = true;
                } else {
                    birthdayGrid.innerHTML += createCard(name, date, 'birthday', desc, index);
                    hasBirthdays = true;
                }
            });

            if (hasBirthdays || !todayAlert.classList.contains('hidden')) {
                document.getElementById('birthday-section').classList.remove('hidden');
            }
            if (hasAnniversaries) {
                document.getElementById('anniversary-section').classList.remove('hidden');
            }
        }

        function createCard(name, date, category, desc, index) {
            const isBirthday = category === 'birthday';
            const icon = isBirthday ? birthdayEmojis[index % birthdayEmojis.length] : '🥂';
            const cardClass = isBirthday ? 'birthday-card' : 'anniversary-card';
            const onClickAction = (isBirthday && desc) ? `onclick="showBubble(event, '${desc.replace(/'/g, "\\'")}')"` : "";
            
            return `
                <div class="event-card ${cardClass}" ${onClickAction}>
                    <div class="event-icon">${icon}</div>
                    <span class="e-name">${name}</span>
                    <div class="e-date">${date}</div>
                </div>
            `;
        }

        function showBubble(event, desc) {
            event.stopPropagation();
            const bubble = document.getElementById('info-bubble');
            const card = event.currentTarget;
            const rect = card.getBoundingClientRect();
            
            if (bubbleTimeout) clearTimeout(bubbleTimeout);
            
            bubble.innerText = desc;
            bubble.style.display = 'block';
            
            const bubbleWidth = bubble.offsetWidth;
            const bubbleHeight = bubble.offsetHeight;
            
            bubble.style.left = (rect.left + window.scrollX + (rect.width / 2) - (bubbleWidth / 2)) + 'px';
            bubble.style.top = (rect.top + window.scrollY - bubbleHeight - 15) + 'px';

            bubbleTimeout = setTimeout(() => { hideBubble(); }, 1500);
        }

        function hideBubble() {
            const bubble = document.getElementById('info-bubble');
            if (bubble.style.display === 'block') {
                bubble.style.display = 'none';
            }
        }

        window.onload = fetchEvents;
    </script>
</body>
</html>
